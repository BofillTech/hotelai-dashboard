  calllog: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>,

  bell: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
  search: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
  plus: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  trash: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5-3h4a1 1 0 011 1v1H9V4a1 1 0 011-1z"/></svg>,
  edit: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  check: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
  x: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  clock: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  save: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
};

// ── Helpers ──
const fmtPhone = (p) => {
  if (!p) return '';
  const d = p.replace(/\D/g, '');
  if (d.length === 11 && d[0] === '1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  return p;
};
const fmtDuration = (ms) => {
  if (!ms) return '0s';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  return `${Math.floor(s/60)}m ${s%60}s`;
};
const fmtRelative = (d) => {
  if (!d) return '';
  const diff = (Date.now() - new Date(d).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
  return new Date(d).toLocaleDateString();
};
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

// ── Toast Component ──
const Toast = ({ toasts, onDismiss }) => (
  <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
    {toasts.map(t => (
      <div key={t.id} className={`toast-enter flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium ${t.type === 'success' ? 'bg-green-600' : t.type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`}>
        <span>{t.message}</span>
        <button onClick={() => onDismiss(t.id)} className="ml-2 opacity-70 hover:opacity-100">{icons.x}</button>
      </div>
    ))}
  </div>
);

// ── Spinner ──
const Spinner = () => <div className="spinner inline-block w-5 h-5 border-2 border-gray-300 border-t-orange-500 rounded-full"></div>;

// ── Badge Components ──
const StatusBadge = ({ status }) => {
  const colors = { completed: 'bg-green-100 text-green-700', open: 'bg-blue-100 text-blue-700', in_progress: 'bg-yellow-100 text-yellow-700', resolved: 'bg-gray-100 text-gray-600', error: 'bg-red-100 text-red-700' };
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-600'}`}>{(status || '').replace('_', ' ')}</span>;
};
const UrgencyBadge = ({ urgency }) => {
  const colors = { high: 'bg-red-100 text-red-700', medium: 'bg-yellow-100 text-yellow-700', low: 'bg-green-100 text-green-700' };
  return urgency ? <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${colors[urgency] || 'bg-gray-100 text-gray-600'}`}>{urgency}</span> : null;
};
const CategoryBadge = ({ category }) => {
  const colors = { reservation: 'bg-purple-100 text-purple-700', billing: 'bg-blue-100 text-blue-700', amenities: 'bg-teal-100 text-teal-700', complaint: 'bg-red-100 text-red-700', general: 'bg-gray-100 text-gray-600' };
  return category ? <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${colors[category] || 'bg-gray-100 text-gray-600'}`}>{category}</span> : null;
};

// ── Login Page ──
const LoginPage = ({ onLogin }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [isSignUp, setIsSignUp] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      let result;
      if (isSignUp) {
        result = await supabase.auth.signUp({ email, password });
        if (result.error) throw result.error;
        if (result.data?.user?.identities?.length === 0) { setError('Account already exists. Please sign in.'); setLoading(false); return; }
        setError('Check your email to confirm your account, then sign in.');
        setIsSignUp(false);
        setLoading(false);
        return;
      } else {
        result = await supabase.auth.signInWithPassword({ email, password });
        if (result.error) throw result.error;
      }
      onLogin(result.data.session);
    } catch (err) {
      setError(err.message || 'Authentication failed');
    }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gray-900">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4">H</div>
          <h1 className="text-3xl font-bold text-white">HotelAI</h1>
          <p className="text-gray-400 mt-2">Front Desk Dashboard</p>
        </div>
        <div className="bg-white rounded-2xl shadow-xl p-8">
          <h2 className="text-xl font-bold text-gray-900 mb-1">{isSignUp ? 'Create Account' : 'Sign In'}</h2>
          <p className="text-gray-500 text-sm mb-6">{isSignUp ? 'Create your admin account' : 'Sign in to manage your hotels'}</p>
          {error && <div className={`mb-4 p-3 rounded-lg text-sm ${error.includes('Check your email') ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'}`}>{error}</div>}
          <form onSubmit={handleSubmit}>
            <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm mb-4" placeholder="you@company.com" />
            <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm mb-6" placeholder="••••••••" />
            <button type="submit" disabled={loading}
              className="w-full py-2.5 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600 transition-colors disabled:opacity-50">
              {loading ? 'Please wait...' : isSignUp ? 'Create Account' : 'Sign In'}
            </button>
          </form>
          <p className="text-center text-sm text-gray-500 mt-4">
            {isSignUp ? 'Already have an account?' : "Don't have an account?"}{' '}
            <button onClick={() => { setIsSignUp(!isSignUp); setError(''); }} className="text-orange-500 font-medium hover:underline">
              {isSignUp ? 'Sign In' : 'Sign Up'}
            </button>
          </p>
        </div>
        <p className="text-center text-gray-600 text-xs mt-6">Powered by <strong className="text-orange-400">Bofill Technologies</strong></p>
      </div>
    </div>
  );
};

// ── Admin Panel ──
const AdminPanel = ({ user, onLogout, onSelectHotel }) => {
  const [hotels, setHotels] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editHotel, setEditHotel] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [form, setForm] = useState({ name: '', slug: '', phone: '', logo_url: '', address: '' });
  const [saving, setSaving] = useState(false);

  const loadHotels = async () => {
    setLoading(true);
    const { data } = await supabase.from('hotels').select('*').order('name');
    setHotels(data || []);
    setLoading(false);
  };

  useEffect(() => { loadHotels(); }, []);

  const openAdd = () => { setEditHotel(null); setForm({ name: '', slug: '', phone: '', logo_url: '', address: '' }); setShowModal(true); };
  const openEdit = (h) => { setEditHotel(h); setForm({ name: h.name || '', slug: h.slug || '', phone: h.phone || '', logo_url: h.logo_url || '', address: h.address || '' }); setShowModal(true); };

  const handleSave = async () => {
    setSaving(true);
    const slug = form.slug || form.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const payload = { ...form, slug };
    if (editHotel) {
      await supabase.from('hotels').update(payload).eq('id', editHotel.id);
    } else {
      await supabase.from('hotels').insert(payload);
    }
    setSaving(false);
    setShowModal(false);
    loadHotels();
  };

  const handleDelete = async (id) => {
    await supabase.from('hotels').delete().eq('id', id);
    setDeleteConfirm(null);
    loadHotels();
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white text-lg font-bold">H</div>
          <div><h1 className="text-xl font-bold text-gray-900">HotelAI Admin</h1><p className="text-xs text-gray-500">Manage your properties</p></div>
        </div>
        <div className="flex items-center gap-4">
          <span className="text-sm text-gray-500">{user?.email}</span>
          <button onClick={onLogout} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-200 rounded-lg hover:bg-gray-50">Sign Out</button>
        </div>
      </div>
      <div className="max-w-6xl mx-auto px-8 py-8">
        <div className="flex items-center justify-between mb-6">
          <div><h2 className="text-2xl font-bold text-gray-900">Properties</h2><p className="text-gray-500 text-sm">{hotels.length} hotel{hotels.length !== 1 ? 's' : ''} configured</p></div>
          <button onClick={openAdd} className="flex items-center gap-2 px-4 py-2.5 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600 transition-colors">
            {icons.plus} Add Hotel
          </button>
        </div>
        {loading ? <div className="flex justify-center py-16"><Spinner /></div> :
        hotels.length === 0 ? (
          <div className="text-center py-16 bg-white rounded-xl border border-gray-200">
            <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">{icons.dashboard}</div>
            <h3 className="text-lg font-medium text-gray-900 mb-2">No hotels yet</h3>
            <p className="text-gray-500 mb-4">Add your first property to get started</p>
            <button onClick={openAdd} className="px-4 py-2 bg-orange-500 text-white rounded-lg font-medium hover:bg-orange-600">{icons.plus} Add Hotel</button>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            {hotels.map(h => (
              <div key={h.id} className="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow group">
                <div className="p-5 cursor-pointer" onClick={() => onSelectHotel(h.slug)}>
                  <div className="flex items-center gap-3 mb-3">
                    {h.logo_url ? <img src={h.logo_url} alt="" className="w-12 h-12 rounded-full object-cover" /> :
                      <div className="w-12 h-12 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-lg font-bold">{(h.name || 'H')[0]}</div>}
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-gray-900 truncate">{h.name}</div>
                      <div className="text-xs text-gray-400 font-mono">/{h.slug}</div>
                    </div>
                  </div>
                  {h.phone && <div className="text-sm text-gray-500 mb-1">{fmtPhone(h.phone)}</div>}
                  {h.address && <div className="text-xs text-gray-400 truncate">{h.address}</div>}
                </div>
                <div className="px-5 py-3 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
                  <button onClick={(e) => { e.stopPropagation(); onSelectHotel(h.slug); }} className="text-sm text-orange-500 font-medium hover:underline">Open Dashboard &rsaquo;</button>
                  <div className="flex gap-2">
                    <button onClick={(e) => { e.stopPropagation(); openEdit(h); }} className="p-1.5 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded">{icons.edit}</button>
                    <button onClick={(e) => { e.stopPropagation(); setDeleteConfirm(h); }} className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded">{icons.trash}</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Add/Edit Modal */}
      {showModal && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setShowModal(false)}>
          <div className="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl" onClick={e => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-gray-900 mb-4">{editHotel ? 'Edit Hotel' : 'Add New Hotel'}</h3>
            <div className="space-y-3">
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Hotel Name *</label>
                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="The Royal Atlantic" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Slug (URL path)</label>
                <input type="text" value={form.slug} onChange={e => setForm({...form, slug: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="royal-atlantic (auto-generated if blank)" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="text" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="+1 (555) 123-4567" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Logo URL</label>
                <input type="text" value={form.logo_url} onChange={e => setForm({...form, logo_url: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="https://..." /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Address</label>
                <input type="text" value={form.address} onChange={e => setForm({...form, address: e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="123 Beach Blvd, Miami FL" /></div>
            </div>
            <div className="flex gap-3 mt-6">
              <button onClick={() => setShowModal(false)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Cancel</button>
              <button onClick={handleSave} disabled={!form.name || saving} className="flex-1 py-2.5 bg-orange-500 text-white rounded-lg text-sm font-medium hover:bg-orange-600 disabled:opacity-50">
                {saving ? 'Saving...' : editHotel ? 'Save Changes' : 'Add Hotel'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Confirmation */}
      {deleteConfirm && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={() => setDeleteConfirm(null)}>
          <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl" onClick={e => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-gray-900 mb-2">Delete Hotel?</h3>
            <p className="text-gray-500 text-sm mb-6">Are you sure you want to delete <strong>{deleteConfirm.name}</strong>? This cannot be undone.</p>
            <div className="flex gap-3">
              <button onClick={() => setDeleteConfirm(null)} className="flex-1 py-2.5 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50">Cancel</button>
              <button onClick={() => handleDelete(deleteConfirm.id)} className="flex-1 py-2.5 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600">Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Sidebar ──
const Sidebar = ({ hotel, page, setPage, onLogout }) => {
  const navItems = [
    { id: 'dashboard', label: 'Dashboard', icon: icons.dashboard },
    { id: 'messages', label: 'Messages Inbox', icon: icons.messages },
    { id: 'calllog', label: 'Call Log', icon: icons.calllog },
    { id: 'settings', label: 'Settings', icon: icons.settings },
  ];
  return (
    <div className="w-60 h-screen bg-gray-900 text-white flex flex-col fixed left-0 top-0 z-30">
      <div className="p-5 flex items-center gap-3">
        {hotel?.logo_url ? <img src={hotel.logo_url} alt="Logo" className="w-10 h-10 rounded-full object-cover" /> : <div className="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center text-lg font-bold">H</div>}

// ── Dashboard Page ──
const DashboardPage = ({ hotel, setPage }) => {
  const [calls, setCalls] = useState([]);
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [stats, setStats] = useState({ totalCalls: 0, openMsgs: 0, avgDuration: 0 });

  useEffect(() => {
    if (!hotel?.id) return;
    const load = async () => {
      setLoading(true);
      const today = new Date(); today.setHours(0,0,0,0);
      const [callRes, msgRes] = await Promise.all([
        supabase.from('calls').select('*').eq('hotel_id', hotel.id).order('created_at', { ascending: false }).limit(50),
        supabase.from('messages').select('*').eq('hotel_id', hotel.id).order('created_at', { ascending: false }).limit(50)
      ]);
      const allCalls = callRes.data || [];
      const allMsgs = msgRes.data || [];
      const todayCalls = allCalls.filter(c => new Date(c.created_at) >= today);
      const durations = allCalls.filter(c => c.duration_ms).map(c => c.duration_ms);
      const avg = durations.length ? Math.round(durations.reduce((a,b) => a+b, 0) / durations.length) : 0;
      setStats({ totalCalls: todayCalls.length, openMsgs: allMsgs.filter(m => m.status === 'open').length, avgDuration: avg });
      setCalls(allCalls.slice(0, 5));
      setMessages(allMsgs.slice(0, 5));
      setLoading(false);
    };
    load();
  }, [hotel?.id]);

  if (loading) return <div className="flex items-center justify-center h-64"><Spinner /></div>;

  return (
    <div>
      <TopBar title="Dashboard" subtitle="Welcome back, here's what's happening" />
      <div className="grid grid-cols-3 gap-5 mb-6">
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <div className="w-10 h-10 bg-orange-50 rounded-lg flex items-center justify-center text-orange-500 mb-3">{icons.calllog}</div>
          <div className="text-gray-500 text-sm">Calls</div>
          <div className="text-3xl font-bold text-gray-900 mt-1">{stats.totalCalls}</div>
          <div className="text-gray-400 text-xs mt-1">Today</div>
        </div>
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <div className="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-500 mb-3">{icons.messages}</div>
          <div className="text-gray-500 text-sm">Open Messages</div>
          <div className="text-3xl font-bold text-gray-900 mt-1">{stats.openMsgs}</div>
          <div className="text-gray-400 text-xs mt-1">{stats.openMsgs} urgent priority</div>
        </div>
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <div className="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center text-green-500 mb-3">{icons.clock}</div>
          <div className="text-gray-500 text-sm">Avg Call Duration</div>
          <div className="text-3xl font-bold text-gray-900 mt-1">{fmtDuration(stats.avgDuration)}</div>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-5">
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <div className="flex items-center justify-between mb-4">
            <div><h3 className="font-semibold text-gray-900">Recent Calls</h3><p className="text-xs text-gray-400">Latest incoming calls</p></div>
            <button onClick={() => setPage('calllog')} className="text-orange-500 text-sm font-medium hover:underline">View All &rsaquo;</button>
          </div>
          {calls.length === 0 ? <p className="text-gray-400 text-sm">No calls yet</p> : calls.map(c => (
            <div key={c.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center text-blue-500">{icons.calllog}</div>
                <div>
                  <div className="text-sm font-medium text-gray-900">{fmtPhone(c.from_number)}</div>
                  <div className="text-xs text-gray-400 flex items-center gap-2">{icons.clock} {fmtDuration(c.duration_ms)} <StatusBadge status={c.call_status || 'completed'} /></div>
                </div>
              </div>
              <span className="text-xs text-gray-400">{fmtRelative(c.created_at)}</span>
            </div>
          ))}
        </div>
        <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
          <div className="flex items-center justify-between mb-4">
            <div><h3 className="font-semibold text-gray-900">Recent Messages</h3><p className="text-xs text-gray-400">Latest guest messages</p></div>
            <button onClick={() => setPage('messages')} className="text-orange-500 text-sm font-medium hover:underline">View All &rsaquo;</button>
          </div>
          {messages.length === 0 ? <p className="text-gray-400 text-sm">No messages yet</p> : messages.map(m => (
            <div key={m.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
              <div>
                <div className="text-sm font-medium text-gray-900">{m.subject || fmtPhone(m.from_number)}</div>
                <div className="text-xs text-gray-400 mt-0.5">{(m.body || '').substring(0, 60)}{m.body && m.body.length > 60 ? '...' : ''}</div>
              </div>
              <div className="text-right"><span className="text-xs text-gray-400">{fmtRelative(m.created_at)}</span><div className="mt-1"><UrgencyBadge urgency={m.urgency} /></div></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Tab 2: Properties ──
const PropertiesTab = ({ hotel, addToast }) => {
  const [properties, setProperties] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name: '', description: '', has_resort_fee: false });

  const load = async () => {
    const { data } = await supabase.from('properties').select('*').eq('hotel_id', hotel.id).order('sort_order');
    setProperties(data || []); setLoading(false);
  };
  useEffect(() => { if (hotel?.id) load(); }, [hotel?.id]);

  const save = async () => {
    if (!form.name) { addToast('Property name required', 'error'); return; }
    if (editing) {
      await supabase.from('properties').update({ name: form.name, description: form.description, has_resort_fee: form.has_resort_fee }).eq('id', editing);
    } else {
      await supabase.from('properties').insert({ hotel_id: hotel.id, name: form.name, description: form.description, has_resort_fee: form.has_resort_fee, sort_order: properties.length + 1 });
    }
    setForm({ name: '', description: '', has_resort_fee: false }); setEditing(null);
    addToast(editing ? 'Property updated!' : 'Property added!', 'success'); load();
  };
  const del = async (id) => {
    await supabase.from('properties').delete().eq('id', id);

// ── Tab 3: Taxes & Fees ──
const TaxesFeesTab = ({ hotel, addToast }) => {
  const [taxes, setTaxes] = useState([]);
  const [fees, setFees] = useState([]);
  const [properties, setProperties] = useState([]);
  const [loading, setLoading] = useState(true);
  const [taxForm, setTaxForm] = useState({ name: '', rate: '', is_active: true });
  const [feeForm, setFeeForm] = useState({ name: '', amount: '', property_id: '', includes_tax: false, is_seasonal: false, season_start: '', season_end: '' });
  const [editingTax, setEditingTax] = useState(null);
  const [editingFee, setEditingFee] = useState(null);

  const load = async () => {
    const [t, f, p] = await Promise.all([
      supabase.from('taxes').select('*').eq('hotel_id', hotel.id).order('sort_order'),
      supabase.from('fees').select('*').eq('hotel_id', hotel.id).order('created_at'),
      supabase.from('properties').select('id, name').eq('hotel_id', hotel.id)
    ]);
    setTaxes(t.data || []); setFees(f.data || []); setProperties(p.data || []); setLoading(false);
  };
  useEffect(() => { if (hotel?.id) load(); }, [hotel?.id]);

  const combinedRate = taxes.filter(t => t.is_active).reduce((sum, t) => sum + parseFloat(t.rate || 0), 0);

  const saveTax = async () => {
    if (!taxForm.name || !taxForm.rate) { addToast('Name and rate required', 'error'); return; }
    if (editingTax) {
      await supabase.from('taxes').update({ name: taxForm.name, rate: taxForm.rate, is_active: taxForm.is_active }).eq('id', editingTax);
    } else {
      await supabase.from('taxes').insert({ hotel_id: hotel.id, name: taxForm.name, rate: taxForm.rate, is_active: taxForm.is_active, sort_order: taxes.length + 1 });
    }
    setTaxForm({ name: '', rate: '', is_active: true }); setEditingTax(null);
    addToast(editingTax ? 'Tax updated!' : 'Tax added!', 'success'); load();
  };
  const delTax = async (id) => { await supabase.from('taxes').delete().eq('id', id); addToast('Tax deleted', 'success'); load(); };

  const saveFee = async () => {
    if (!feeForm.name || !feeForm.amount) { addToast('Name and amount required', 'error'); return; }
    const payload = { name: feeForm.name, amount: feeForm.amount, includes_tax: feeForm.includes_tax, is_seasonal: feeForm.is_seasonal,
      property_id: feeForm.property_id || null, season_start: feeForm.is_seasonal ? (feeForm.season_start || null) : null, season_end: feeForm.is_seasonal ? (feeForm.season_end || null) : null };
    if (editingFee) { await supabase.from('fees').update(payload).eq('id', editingFee); }
    else { await supabase.from('fees').insert({ ...payload, hotel_id: hotel.id }); }
    setFeeForm({ name: '', amount: '', property_id: '', includes_tax: false, is_seasonal: false, season_start: '', season_end: '' }); setEditingFee(null);
    addToast(editingFee ? 'Fee updated!' : 'Fee added!', 'success'); load();
  };
  const delFee = async (id) => { await supabase.from('fees').delete().eq('id', id); addToast('Fee deleted', 'success'); load(); };

  if (loading) return <div className="text-center p-8"><Spinner /></div>;
  return (
    <div className="space-y-6">
      <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
        <div className="flex items-center justify-between mb-4">
          <div><h3 className="font-semibold text-gray-900">Taxes</h3><p className="text-sm text-gray-400">Tax rates applied to bookings</p></div>
          <div className="text-sm font-medium text-orange-600">Combined Rate: {combinedRate.toFixed(3)}%</div>
        </div>
        {taxes.map(t => (
          <div key={t.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
            <div className="flex items-center gap-3">
              <span className={`w-2 h-2 rounded-full ${t.is_active ? 'bg-green-500' : 'bg-gray-300'}`}></span>
              <span className="font-medium text-gray-900">{t.name}</span>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-sm font-mono text-gray-700">{parseFloat(t.rate).toFixed(3)}%</span>
              <button onClick={() => { setEditingTax(t.id); setTaxForm({ name: t.name, rate: t.rate, is_active: t.is_active }); }} className="p-1.5 text-gray-400 hover:text-blue-500">{icons.edit}</button>
              <button onClick={() => delTax(t.id)} className="p-1.5 text-gray-400 hover:text-red-500">{icons.trash}</button>
            </div>
          </div>
        ))}
        <div className="mt-4 pt-4 border-t border-gray-100 grid grid-cols-3 gap-3 items-end">
          <Field label="Tax Name" value={taxForm.name} onChange={v => setTaxForm(f => ({...f, name: v}))} placeholder="e.g. Sales Tax" />
          <Field label="Rate (%)" value={taxForm.rate} onChange={v => setTaxForm(f => ({...f, rate: v}))} placeholder="8.75" type="number" />
          <div className="flex gap-2 items-center">
            <Toggle label="Active" checked={taxForm.is_active} onChange={v => setTaxForm(f => ({...f, is_active: v}))} />
            <button onClick={saveTax} className="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-medium hover:bg-orange-600">{editingTax ? 'Update' : 'Add'}</button>
            {editingTax && <button onClick={() => { setEditingTax(null); setTaxForm({ name: '', rate: '', is_active: true }); }} className="px-3 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">Cancel</button>}
          </div>
        </div>
      </div>
      <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
        <h3 className="font-semibold text-gray-900 mb-1">Fees</h3>
        <p className="text-sm text-gray-400 mb-4">Additional charges (resort fees, service charges, etc.)</p>
        {fees.map(f => (
          <div key={f.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
            <div>
              <span className="font-medium text-gray-900">{f.name}</span>
              <span className="text-sm text-gray-500 ml-2">${parseFloat(f.amount).toFixed(2)}/night</span>
              {f.includes_tax && <span className="ml-2 px-1.5 py-0.5 bg-green-100 text-green-700 rounded text-xs">incl. tax</span>}
              {f.is_seasonal && <span className="ml-2 px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-xs">Seasonal: {fmtDate(f.season_start)} - {fmtDate(f.season_end)}</span>}
              {f.property_id && <span className="ml-2 text-xs text-gray-400">{properties.find(p => p.id === f.property_id)?.name}</span>}
            </div>
            <div className="flex gap-2">
              <button onClick={() => { setEditingFee(f.id); setFeeForm({ name: f.name, amount: f.amount, property_id: f.property_id || '', includes_tax: f.includes_tax, is_seasonal: f.is_seasonal, season_start: f.season_start || '', season_end: f.season_end || '' }); }} className="p-1.5 text-gray-400 hover:text-blue-500">{icons.edit}</button>
              <button onClick={() => delFee(f.id)} className="p-1.5 text-gray-400 hover:text-red-500">{icons.trash}</button>
            </div>
          </div>
        ))}
        <div className="mt-4 pt-4 border-t border-gray-100 space-y-3">
          <div className="grid grid-cols-3 gap-3">
            <Field label="Fee Name" value={feeForm.name} onChange={v => setFeeForm(f => ({...f, name: v}))} placeholder="Resort Fee" />
            <Field label="Amount ($)" value={feeForm.amount} onChange={v => setFeeForm(f => ({...f, amount: v}))} placeholder="27.15" type="number" />
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Property</label>
              <select value={feeForm.property_id} onChange={e => setFeeForm(f => ({...f, property_id: e.target.value}))} className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm">
                <option value="">All Properties</option>
                {properties.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
          </div>
          <div className="flex items-center gap-6 flex-wrap">
            <Toggle label="Includes Tax" checked={feeForm.includes_tax} onChange={v => setFeeForm(f => ({...f, includes_tax: v}))} />
            <Toggle label="Seasonal" checked={feeForm.is_seasonal} onChange={v => setFeeForm(f => ({...f, is_seasonal: v}))} />
            {feeForm.is_seasonal && <>
              <Field label="Start" value={feeForm.season_start} onChange={v => setFeeForm(f => ({...f, season_start: v}))} type="date" />
              <Field label="End" value={feeForm.season_end} onChange={v => setFeeForm(f => ({...f, season_end: v}))} type="date" />
            </>}
            <button onClick={saveFee} className="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-medium hover:bg-orange-600 ml-auto">{editingFee ? 'Update' : 'Add'}</button>
            {editingFee && <button onClick={() => { setEditingFee(null); setFeeForm({ name: '', amount: '', property_id: '', includes_tax: false, is_seasonal: false, season_start: '', season_end: '' }); }} className="px-3 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">Cancel</button>}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Tab 4: Phone Routing ──
const PhoneRoutingTab = ({ hotel, setHotel, addToast }) => {
  const [numbers, setNumbers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({ label: '', phone_number: '', when_to_use: '', is_primary: false });
  const [editing, setEditing] = useState(null);
  const [transfer, setTransfer] = useState({ enabled: false, timeout: 30, desk: '', cell: '' });
  const [saving, setSaving] = useState(false);

  const load = async () => {
    const { data } = await supabase.from('forwarding_numbers').select('*').eq('hotel_id', hotel.id).order('is_primary', { ascending: false });
    setNumbers(data || []); setLoading(false);
  };
  useEffect(() => { if (hotel?.id) load(); }, [hotel?.id]);
  useEffect(() => { if (hotel) setTransfer({ enabled: hotel.transfer_enabled || false, timeout: hotel.transfer_timeout_secs || 30, desk: hotel.desk_phone || '', cell: hotel.emergency_cell || '' }); }, [hotel]);

  const saveNumber = async () => {
    if (!form.label || !form.phone_number) { addToast('Label and phone required', 'error'); return; }
    if (editing) { await supabase.from('forwarding_numbers').update({ label: form.label, phone_number: form.phone_number, when_to_use: form.when_to_use, is_primary: form.is_primary }).eq('id', editing); }
    else { await supabase.from('forwarding_numbers').insert({ hotel_id: hotel.id, ...form }); }
    setForm({ label: '', phone_number: '', when_to_use: '', is_primary: false }); setEditing(null);
    addToast(editing ? 'Number updated!' : 'Number added!', 'success'); load();
  };
  const del = async (id) => { await supabase.from('forwarding_numbers').delete().eq('id', id); addToast('Number deleted', 'success'); load(); };

  const saveTransfer = async () => {
    setSaving(true);
    await supabase.from('hotels').update({ transfer_enabled: transfer.enabled, transfer_timeout_secs: transfer.timeout, desk_phone: transfer.desk, emergency_cell: transfer.cell, updated_at: new Date().toISOString() }).eq('id', hotel.id);
    setSaving(false); addToast('Transfer settings saved!', 'success');
    setHotel(h => ({ ...h, transfer_enabled: transfer.enabled, transfer_timeout_secs: transfer.timeout, desk_phone: transfer.desk, emergency_cell: transfer.cell }));
  };

  if (loading) return <div className="text-center p-8"><Spinner /></div>;
  return (
    <div className="space-y-6">
      <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
        <h3 className="font-semibold text-gray-900 mb-1">Transfer Settings</h3>
        <p className="text-sm text-gray-400 mb-4">Configure how calls are transferred to staff</p>
        <div className="grid grid-cols-2 gap-4 mb-4">
          <Field label="Front Desk Phone" value={transfer.desk} onChange={v => setTransfer(t => ({...t, desk: v}))} placeholder="+15163619751" />
          <Field label="Emergency Cell" value={transfer.cell} onChange={v => setTransfer(t => ({...t, cell: v}))} placeholder="+15163619751" />
        </div>
        <div className="flex items-center gap-6 mb-4">
          <Toggle label="Transfer Enabled" checked={transfer.enabled} onChange={v => setTransfer(t => ({...t, enabled: v}))} />
          <Field label="Timeout (seconds)" value={transfer.timeout} onChange={v => setTransfer(t => ({...t, timeout: parseInt(v) || 30}))} type="number" />
        </div>
        <div className="flex justify-end"><SaveBtn onClick={saveTransfer} saving={saving} /></div>
      </div>
      <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
        <h3 className="font-semibold text-gray-900 mb-4">Forwarding Numbers</h3>
        {numbers.map(n => (
          <div key={n.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
            <div>
              <div className="flex items-center gap-2">
                <span className="font-medium text-gray-900">{n.label}</span>
                {n.is_primary && <span className="px-1.5 py-0.5 bg-orange-100 text-orange-700 rounded text-xs font-medium">Primary</span>}
              </div>
              <div className="text-sm text-gray-500">{fmtPhone(n.phone_number)}</div>
              {n.when_to_use && <div className="text-xs text-gray-400 mt-0.5">{n.when_to_use}</div>}
            </div>
            <div className="flex gap-2">
              <button onClick={() => { setEditing(n.id); setForm({ label: n.label, phone_number: n.phone_number, when_to_use: n.when_to_use || '', is_primary: n.is_primary }); }} className="p-1.5 text-gray-400 hover:text-blue-500">{icons.edit}</button>
              <button onClick={() => del(n.id)} className="p-1.5 text-gray-400 hover:text-red-500">{icons.trash}</button>
            </div>
          </div>
        ))}
        <div className="mt-4 pt-4 border-t border-gray-100 grid grid-cols-2 gap-3">
          <Field label="Label" value={form.label} onChange={v => setForm(f => ({...f, label: v}))} placeholder="Front Desk" />
          <Field label="Phone Number" value={form.phone_number} onChange={v => setForm(f => ({...f, phone_number: v}))} placeholder="+15163619751" />
          <Field label="When to Use" value={form.when_to_use} onChange={v => setForm(f => ({...f, when_to_use: v}))} placeholder="Transfer for check-in issues" className="col-span-2" />
          <div className="col-span-2 flex items-center justify-between">
            <Toggle label="Primary Number" checked={form.is_primary} onChange={v => setForm(f => ({...f, is_primary: v}))} />
            <div className="flex gap-2">
              {editing && <button onClick={() => { setEditing(null); setForm({ label: '', phone_number: '', when_to_use: '', is_primary: false }); }} className="px-3 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">Cancel</button>}
              <button onClick={saveNumber} className="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-medium hover:bg-orange-600">{editing ? 'Update' : 'Add Number'}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

          </div>
        </div>
        <Field label="Property ID" value={form.pms_property_id} onChange={v => set('pms_property_id', v)} />
        <Field label="Client ID" value={form.pms_client_id} onChange={v => set('pms_client_id', v)} />
      </div>
      <div className="flex items-center justify-between">
        <button className="px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50">Test Connection</button>
        <SaveBtn onClick={save} saving={saving} />
      </div>
    </div>
  );
};

// ── Tab 7: Workflows ──
const WorkflowsTab = ({ hotel }) => {
  const [workflows, setWorkflows] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!hotel?.id) return;
    supabase.from('n8n_workflows').select('*').eq('hotel_id', hotel.id).order('workflow_type')
      .then(({ data }) => { setWorkflows(data || []); setLoading(false); });
  }, [hotel?.id]);

  const typeLabels = { function_handler: 'Function Handler', reservation_lookup: 'Reservation Lookup', invoice_lookup: 'Invoice Lookup', rate_lookup: 'Rate Lookup', webhook_handler: 'Webhook Handler' };
  const statusColors = { active: 'bg-green-100 text-green-700', paused: 'bg-yellow-100 text-yellow-700', error: 'bg-red-100 text-red-700' };

  if (loading) return <div className="text-center p-8"><Spinner /></div>;
  return (
    <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
      <h3 className="font-semibold text-gray-900 mb-1">n8n Workflows</h3>
      <p className="text-sm text-gray-400 mb-4">Automation workflows connected to this property</p>
      {workflows.length === 0 ? <p className="text-gray-400 text-sm py-4">No workflows configured</p> :
        <table className="w-full text-sm">
          <thead><tr className="bg-gray-50 text-gray-500 text-xs uppercase">
            <th className="px-4 py-3 text-left">Workflow</th><th className="px-4 py-3 text-left">n8n ID</th>
            <th className="px-4 py-3 text-left">Status</th><th className="px-4 py-3 text-left">Last Triggered</th>
          </tr></thead>
          <tbody>{workflows.map(w => (
            <tr key={w.id} className="border-b border-gray-50">
              <td className="px-4 py-3 font-medium text-gray-900">{typeLabels[w.workflow_type] || w.workflow_type}</td>
              <td className="px-4 py-3 font-mono text-gray-500 text-xs">{w.n8n_workflow_id}</td>
              <td className="px-4 py-3"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${statusColors[w.status] || 'bg-gray-100 text-gray-600'}`}>{w.status}</span></td>
              <td className="px-4 py-3 text-gray-400">{w.last_triggered_at ? fmtRelative(w.last_triggered_at) : 'Never'}</td>
            </tr>
          ))}</tbody>
        </table>
      }
      <p className="text-xs text-gray-400 mt-4">Workflows are managed via n8n at bofilltech.app.n8n.cloud. Contact Bofill Technologies to modify.</p>
    </div>
  );
};

// ── Main App ──
function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [hotel, setHotel] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [toasts, setToasts] = useState([]);
  const toastId = useRef(0);

  const addToast = (message, type = 'info') => {
    const id = ++toastId.current;
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  };

  const handleLogout = async () => {
    await supabase.auth.signOut();
    setSession(null);
    setHotel(null);
    setError(null);
    window.history.pushState({}, '', '/');
  };

  // Check auth state on load
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session: s } }) => {
      setSession(s);
      setAuthLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, s) => {
      setSession(s);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Determine slug from URL
  const getSlug = () => {
    const params = new URLSearchParams(window.location.search);
    let slug = params.get('slug') || window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (!slug || slug === 'index.html' || slug === 'hotelai-dashboard.html' || slug === '404.html') return null;
    return slug;
  };

  const currentSlug = getSlug();

  // Load hotel when slug is present (no auth required for hotel dashboards)
  useEffect(() => {
    if (!currentSlug) { setLoading(false); return; }
    setLoading(true);

    const trySlug = async (s) => {
      const { data } = await supabase.from('hotels').select('*').eq('slug', s).single();
      return data;
    };

    const loadHotel = async () => {
      let data = await trySlug(currentSlug);
      if (!data && !currentSlug.includes('-')) {
        const { data: all } = await supabase.from('hotels').select('slug, id').ilike('slug', '%' + currentSlug.substring(0, 5) + '%');
        if (all && all.length > 0) data = await trySlug(all[0].slug);
      }
      if (!data && currentSlug.includes('-')) {
        data = await trySlug(currentSlug.replace(/-/g, ''));
      }
      if (!data) { setError('Hotel "' + currentSlug + '" not found.'); }
      else { setHotel(data); document.title = data.name + ' - HotelAI Dashboard'; }
      setLoading(false);
    };
    loadHotel();
  }, [currentSlug]);

  // If there's a slug, show the hotel dashboard directly (no login needed)
  if (currentSlug) {
    if (loading) return <div className="h-screen flex items-center justify-center"><Spinner /><span className="ml-3 text-gray-500">Loading dashboard...</span></div>;
    if (error) return (
      <div className="h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="text-6xl font-bold text-gray-200 mb-4">404</div>
          <div className="text-gray-500 mb-2">{error}</div>
          <div className="text-sm text-gray-400 mt-4">Powered by <strong className="text-orange-500">Bofill Technologies</strong></div>
        </div>
      </div>
    );
    if (hotel) return (
      <div className="flex min-h-screen">
        <Toast toasts={toasts} onDismiss={id => setToasts(t => t.filter(x => x.id !== id))} />
        <Sidebar hotel={hotel} page={page} setPage={setPage} onLogout={session ? handleLogout : null} />
        <div className="ml-60 flex-1 p-8">
          {page === 'dashboard' && <DashboardPage hotel={hotel} setPage={setPage} />}
          {page === 'messages' && <MessagesPage hotel={hotel} />}
          {page === 'calllog' && <CallLogPage hotel={hotel} />}
          {page === 'settings' && <SettingsPage hotel={hotel} setHotel={setHotel} addToast={addToast} />}
        </div>
      </div>
    );
    return null;
  }

  // No slug → Admin area (requires login)
  if (authLoading) return <div className="h-screen flex items-center justify-center bg-gray-900"><Spinner /><span className="ml-3 text-gray-400">Loading...</span></div>;
  if (!session) return <LoginPage onLogin={(s) => setSession(s)} />;
  return <AdminPanel user={session.user} onLogout={handleLogout} onSelectHotel={(slug) => { window.location.href = '/' + slug; }} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
